<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newtab Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 350px;
      background: white;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 18px;
      margin: 0;
    }
    .content {
      padding: 16px;
    }
    .section {
      margin-bottom: 16px;
    }
    .label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #666;
      margin-bottom: 8px;
    }
    select, input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
    select:focus, input:focus {
      outline: none;
      border-color: #667eea;
      background: #f9f9ff;
    }
    input {
      display: none;
      margin-top: 6px;
    }
    input.show {
      display: block;
    }
    .footer {
      font-size: 10px;
      color: #999;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 Newtab</h1>
  </div>
  
  <div class="content">
    <div class="section">
      <label class="label">🆕 Page au démarrage:</label>
      <select id="newtabUrlPreset">
        <option value="google">Google</option>
        <option value="startpage">StartPage</option>
        <option value="duckduckgo">DuckDuckGo</option>
        <option value="github">GitHub</option>
        <option value="custom">Personnalisée</option>
      </select>
      <input type="text" id="newtabUrlCustom" placeholder="https://example.com">
      <div class="footer" id="feedback"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
